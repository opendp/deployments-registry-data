url_slug: template
status: Draft
tier: 3
deployment:
  product:
    # Tier 1:
    name: 'Energy Measurement for OhmConnect Virtual Power Plant as part of the Energy Differential Privacy (EDC) project by Recurve-OhmConnect'
    data_curators:
      - 'Recurve'
      - 'OhmConnect'
    intended_use: "Measure and verify the impact of residential energy demand flexibility in OhmConnect\'s Virtual Power Plant (VPP) during the California August 2020 blackouts."
    data_product_type: Summary statistics
    data_product_region: 'Global'
    description: 'This deployment released residential energy consumption statistics derived from smart meter data. Specifically, differentially private estimates of average energy load and percent load change were computed using data from 4,948 non-solar electric meters selected from OhmConnect customers.'
    publication_date: '2020-12-01'
    data_product_sector: Energy

  # Tiers 2 and 3:
  dp_flavor:
    name: Approximate DP
    input_metric: ''
    bound_on_input_distance: ''
    output_measure: ''
    bound_on_output_distance: ''
    data_domain: '' # Tier 3
    unprotected_quantities: '' # Tier 3

  privacy_loss:
    privacy_unit: 'User (meter) per day'
    privacy_unit_description: ''
    privacy_parameters:
      epsilon: 6.8
      delta: 4.08e-8
    privacy_parameters_description: 'Several different mechanisms were used with varying epsilon value, which can be composee to a (6.8, 4.08e-8)-DP guarantee: Average load shape was computed with (4, 4.08e-8)-DP; a clamping bound was computed with (0.3, 0)-DP (pure) and percent load change was computed with (2.5, 0)-DP (pure).'

  model:
    model_name: Central
    model_name_description: ''
    actors: ''
    release_type: One release
    release_type_description: 'There are no indicated plans for future uses or publications of the specific data sample used to create this data product, but Recurve intends to apply DP mechianism to use consumer data, which was not available before, to scale the cost-effective deployment of demand side energy resources and utilities by performing privacy-preserving measurements of load impacts.'
    data_source_type: Static
    data_source_type_description: 'Dataset is a collection of readings from 4,948 non-solar electric meters selected from OhmConnect customers (the Comparison Group Pool).'
    access_type: Non-interactive
    access_type_description: ''

  accounting:
    post_processing: '' # Tier 3
    composition: '' # Tier 3

  implementation:
    pre_processing_eda_hyperparameter_tuning: '' # Tier 3
    mechanisms: 'Gaussian mechanism for the computation of the average load shape to satisfy (4, 4.08e-8)-DP; Laplace mechanism with Sparse Vector Technique (SVT) to choose a clamping bound to satisfy (0.3, 0)-DP (pure); and Laplace mechanism for the computation of percent load change to satisfy (2.5, 0)-DP (pure).'
    justification: "Pre-defined privacy/utility targets, but with a more privacy-oriented approach. The developers at Recurve reported in their report that \"In this work, we erred on the side of caution, picking epsilon values representing a high degree of privacy protection\". Also they state that \"It was found that an ε=0.2 was required for accurate SVT (999/1000 trials agreeing on a clamping bound).\", and \"The required ε was determined stochastically to achieve approximately 1% error in the final percent load change.\""

  resources:
    sources: 'https://assets.website-files.com/5cb0a177570549b5f11b9550/6050a2a48c39eb09319c9382_Quantifying%20The%20OhmConnect%20Virtual%20Power%20Plant%20During%20the%20California%20Blackouts%20(1).pdf' # white paper
    notes: ''
    registry_authors:
      - 'Michael Khavkin' # Fill in correct value.
